<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 大学智能判题系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script defer src="/static/js/app.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">📝 大学智能判题系统</a>
        <div class="nav-links">
            <a href="/" class="active">智能判题</a>
            <a href="/bank">题库管理</a>
        </div>
    </nav>

    <div class="container grid-2">
        <!-- Left Panel: Input Area -->
        <div class="card">
            <h2 class="card-title">提交答卷图片</h2>
            
            <form id="judge-form">
                <div class="form-group">
                    <div class="upload-area" id="upload-area">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">点击或拖拽上传答题图片<br><small>(支持手机拍照)</small></div>
                        <input type="file" id="image-input" accept="image/*" capture="camera" required>
                    </div>
                    <img id="image-preview" class="preview-image" alt="预览图">
                </div>

                <div class="form-group radio-group">
                    <label class="radio-label">
                        <input type="radio" name="judge_mode" value="manual" checked> 手动输入答案
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="judge_mode" value="bank"> 从题库自动匹配
                    </label>
                </div>

                <div class="form-group" id="manual-answer-group">
                    <label class="form-label" for="standard-answer">标准答案 (选填)</label>
                    <textarea id="standard-answer" placeholder="请输入本题的标准答案或评分细则..."></textarea>
                </div>

                <div id="error-message" class="form-group hidden" style="color: var(--error); font-size: 0.9rem;"></div>

                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                    <span class="spinner"></span>
                    <span class="btn-text">提交判题</span>
                </button>
            </form>
        </div>

        <!-- Right Panel: Results Area -->
        <div class="card">
            <h2 class="card-title">判题结果</h2>
            
            <div id="result-area" class="result-container">
                <div class="result-placeholder" id="result-placeholder">
                    上传答卷并提交后，AI 判题结果将在此显示
                </div>
                
                <!-- Results template (hidden by default) -->
                <div id="result-content" class="hidden">
                    <div class="score-display">
                        <div class="score-circle">
                            <span id="res-score">0</span><span style="font-size: 0.8rem; color: #999;">/<span id="res-total">0</span></span>
                        </div>
                        <div class="score-details">
                            <div class="badge" id="res-type">未知题型</div>
                            <div style="font-weight: 500; font-size: 1.1rem;" id="res-judgment">判题中...</div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <h3 style="font-size: 1rem; margin-bottom: 8px;">识别内容</h3>
                        <div class="result-explanation" id="res-recognized">无</div>
                    </div>

                    <div class="mt-3">
                        <h3 style="font-size: 1rem; margin-bottom: 8px;">综合点评</h3>
                        <div class="result-explanation" id="res-explanation">无</div>
                    </div>

                    <div class="mt-3 table-container hidden" id="res-steps-container">
                        <h3 style="font-size: 1rem; margin-bottom: 8px;">步骤得分详情</h3>
                        <table id="res-steps-table">
                            <thead>
                                <tr>
                                    <th>步骤</th>
                                    <th>得分</th>
                                    <th>状态</th>
                                    <th>评语</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Steps dynamically injected -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
