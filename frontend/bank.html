<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理 - 大学智能判题系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <script defer src="/static/js/bank.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">大学智能判题系统</a>
        <div class="nav-links">
            <a href="/">智能判题</a>
            <a href="/bank" class="active">题库管理</a>
        </div>
    </nav>

    <main class="container page-shell bank-page">
        <header class="page-header page-header-featured">
            <div class="page-intro">
                <p class="page-eyebrow">题库管理</p>
                <h1 class="page-title">把题库整理成可复用、可检索、可持续维护的教学资产</h1>
                <p class="page-description">支持批量导入、手动补录和条件筛选，适合日常教研积累与学期复盘。</p>
            </div>
            <div class="page-aside">
                <div class="info-chip">批量解析</div>
                <div class="info-chip">手动补录</div>
                <div class="info-chip">条件筛选</div>
            </div>
        </header>

        <section class="bank-actions">
            <div class="panel import-panel">
                <div class="section-heading">
                    <h2 class="card-title">批量导入题库</h2>
                    <p>支持 Word / PDF 文档解析，优先作为题库维护的主流程。</p>
                </div>

                <div class="import-row">
                    <div class="upload-area" id="doc-upload-area">
                        <div class="upload-icon">题库</div>
                        <div class="upload-text">批量上传试卷 / 答案 PDF</div>
                        <div class="upload-hint">一键多选导入，系统会按文件名自动匹配，例如 `L-A.pdf` 对应 `L-A答案.pdf`</div>
                        <input type="file" id="doc-input" accept=".docx,.pdf" multiple>
                    </div>
                    <button type="button" id="upload-doc-btn" class="btn btn-accent import-action-btn">
                        <span class="spinner"></span>
                        <span class="btn-text">解析文档</span>
                    </button>
                </div>

                <div id="preview-container" class="preview-panel hidden">
                    <h3 class="section-title">解析预览</h3>
                    <div class="table-panel">
                        <div class="table-scroll">
                            <table id="preview-table">
                                <thead>
                                    <tr>
                                        <th>题型</th>
                                        <th>题面</th>
                                        <th>标准答案</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="preview-footer">
                        <span id="preview-count">解析到 0 道题目</span>
                        <button type="button" id="confirm-import-btn" class="btn btn-primary">
                            <span class="spinner"></span>
                            <span class="btn-text">确认导入题库</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel bank-data-panel">
                <div class="card-title">
                    <span>题库列表</span>
                    <div class="table-actions">
                        <button type="button" id="bulk-delete-btn" class="btn btn-outline hidden">批量删除</button>
                        <button type="button" id="toggle-manual-btn" class="btn btn-outline">+ 手动添加</button>
                    </div>
                </div>

                <div id="manual-add-form" class="manual-panel hidden mb-3">
                    <form id="add-q-form">
                        <div class="grid-2 form-grid">
                            <div class="form-group">
                                <label class="form-label" for="add-q-type">题型</label>
                                <select id="add-q-type" required>
                                    <option value="填空题">填空题</option>
                                    <option value="计算题">计算题</option>
                                    <option value="简答题">简答题</option>
                                </select>
                            </div>
                            <div class="form-group form-group-spacer" aria-hidden="true"></div>
                            <div class="form-group form-group-wide">
                                <label class="form-label" for="add-q-content">题面</label>
                                <textarea id="add-q-content" required></textarea>
                            </div>
                            <div class="form-group form-group-wide">
                                <label class="form-label" for="add-q-answer">标准答案</label>
                                <textarea id="add-q-answer" required></textarea>
                            </div>
                        </div>
                        <div class="button-row button-row-end">
                            <button type="button" class="btn btn-outline" id="cancel-manual-btn">取消</button>
                            <button type="submit" class="btn btn-primary" id="save-manual-btn">
                                <span class="spinner"></span>
                                <span class="btn-text">保存</span>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="filter-toolbar">
                    <div class="toolbar-group toolbar-group-grow">
                        <input type="text" id="search-keyword" placeholder="搜索题面或答案关键字...">
                        <select id="filter-type">
                            <option value="">全部题型</option>
                            <option value="填空题">填空题</option>
                            <option value="计算题">计算题</option>
                            <option value="简答题">简答题</option>
                        </select>
                    </div>
                    <div class="toolbar-group">
                        <button type="button" id="search-btn" class="btn btn-primary">查询</button>
                    </div>
                </div>

                <div class="table-panel">
                    <div class="table-scroll">
                        <table id="bank-table">
                            <thead>
                                <tr>
                                    <th class="checkbox-col">
                                        <input type="checkbox" id="select-all-questions" aria-label="全选题目">
                                    </th>
                                    <th>序号</th>
                                    <th>题型</th>
                                    <th>题面</th>
                                    <th>标准答案</th>
                                    <th>来源</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="table-state-cell">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="load-more-row">
                    <button type="button" id="load-more-btn" class="btn btn-outline hidden">加载更多</button>
                </div>

                <template id="delete-button-template">
                    <button type="button" class="btn btn-danger delete-btn">删除</button>
                </template>
            </div>
        </section>
    </main>

    <div id="math-preview-backdrop" class="math-preview-backdrop hidden"></div>
    <div id="math-preview-popover" class="math-preview-popover hidden" aria-hidden="true">
        <div class="math-preview-header">
            <span id="math-preview-title">题面预览</span>
            <button type="button" id="math-preview-close" class="math-preview-close" aria-label="关闭预览">关闭</button>
        </div>
        <div id="math-preview-content" class="math-preview-content"></div>
    </div>
</body>
</html>
