<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理 - 大学智能判题系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script defer src="/static/js/bank.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">📝 大学智能判题系统</a>
        <div class="nav-links">
            <a href="/">智能判题</a>
            <a href="/bank" class="active">题库管理</a>
        </div>
    </nav>

    <div class="container">
        <!-- Top Section: Batch Import -->
        <div class="card">
            <h2 class="card-title">批量导入题库 (支持 Word / PDF)</h2>
            <div class="flex align-center">
                <div class="upload-area" id="doc-upload-area" style="flex: 1; padding: 20px;">
                    <div class="upload-text">点击或拖拽上传试卷/答案文档 (.docx, .pdf)</div>
                    <input type="file" id="doc-input" accept=".docx,.pdf">
                </div>
                <button type="button" id="upload-doc-btn" class="btn btn-accent" style="height: 100%; min-height: 64px;">
                    <span class="spinner"></span>
                    <span class="btn-text">解析文档</span>
                </button>
            </div>

            <div id="preview-container" class="mt-3 hidden">
                <h3 style="font-size: 1rem; margin-bottom: 8px;">解析预览</h3>
                <div class="table-container" style="max-height: 300px; overflow-y: auto;">
                    <table id="preview-table">
                        <thead>
                            <tr>
                                <th width="15%">题型</th>
                                <th width="40%">题面</th>
                                <th width="45%">标准答案</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="flex mt-3 justify-between align-center">
                    <span style="font-size: 0.9rem; color: var(--text-secondary);" id="preview-count">解析到 0 道题目</span>
                    <button type="button" id="confirm-import-btn" class="btn btn-primary">
                        <span class="spinner"></span>
                        <span class="btn-text">确认导入题库</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Section: Question List -->
        <div class="card">
            <div class="card-title">
                <span>题库列表</span>
                <button type="button" id="toggle-manual-btn" class="btn btn-outline" style="font-size: 0.85rem; padding: 6px 12px;">+ 手动添加</button>
            </div>

            <!-- Manual Add Form (Hidden by default) -->
            <div id="manual-add-form" class="hidden mb-3" style="background: var(--bg); padding: 16px; border-radius: var(--radius);">
                <form id="add-q-form">
                    <div class="grid-2" style="gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">题型</label>
                            <select id="add-q-type" required>
                                <option value="填空题">填空题</option>
                                <option value="计算题">计算题</option>
                                <option value="简答题">简答题</option>
                            </select>
                        </div>
                        <div></div>
                        <div class="form-group">
                            <label class="form-label">题面</label>
                            <textarea id="add-q-content" required></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">标准答案</label>
                            <textarea id="add-q-answer" required></textarea>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <button type="button" class="btn btn-outline" id="cancel-manual-btn" style="margin-right: 8px;">取消</button>
                        <button type="submit" class="btn btn-primary" id="save-manual-btn">
                            <span class="spinner"></span>保存
                        </button>
                    </div>
                </form>
            </div>

            <!-- Filters -->
            <div class="flex mb-3">
                <input type="text" id="search-keyword" placeholder="搜索题面或答案关键字..." style="flex: 2;">
                <select id="filter-type" style="flex: 1;">
                    <option value="">全部题型</option>
                    <option value="填空题">填空题</option>
                    <option value="计算题">计算题</option>
                    <option value="简答题">简答题</option>
                </select>
                <button type="button" id="search-btn" class="btn btn-primary">查询</button>
            </div>

            <!-- List Table -->
            <div class="table-container">
                <table id="bank-table">
                    <thead>
                        <tr>
                            <th width="5%">序号</th>
                            <th width="10%">题型</th>
                            <th width="35%">题面</th>
                            <th width="35%">标准答案</th>
                            <th width="10%">来源</th>
                            <th width="5%">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div style="text-align: center; margin-top: 16px;">
                <button type="button" id="load-more-btn" class="btn btn-outline hidden">加载更多</button>
            </div>
        </div>
    </div>
</body>
</html>
