# GitLab / Gitee CI/CD Pipeline
# NOTE: Use minimal, conservative keys for Gitee compatibility.

stages:
  - lint
  - test

# ---------- Lint Stage ----------

ruff-check:
  image: python:3.12-slim
  stage: lint
  script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install ruff
    - ruff check backend/

ruff-format:
  image: python:3.12-slim
  stage: lint
  script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install ruff
    - ruff format --check backend/

# ---------- Test Stage ----------

pytest:
  image: python:3.12-slim
  stage: test
  script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pytest test/ -v --tb=short || (code=$?; if [ "$code" -eq 5 ]; then echo "No tests collected. Treating as pass in CI."; else exit "$code"; fi)
